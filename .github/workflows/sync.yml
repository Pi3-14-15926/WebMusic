name: Sync Music from WebDAV

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install rclone
        run: |
          sudo apt-get update
          sudo apt-get install -y rclone

      - name: Check WebDAV config sources
        id: check-config
        run: |
          if [ -n "${{ secrets.WEBDAV_URL }}" ] && [ -n "${{ secrets.WEBDAV_USER }}" ] && [ -n "${{ secrets.WEBDAV_PASS }}" ]; then
            echo "method=secrets" >> $GITHUB_OUTPUT
            echo "configured=true" >> $GITHUB_OUTPUT
          elif [ -f webdav-config.enc ] && [ -n "${{ secrets.CONFIG_PASS }}" ]; then
            echo "method=encrypted" >> $GITHUB_OUTPUT
            echo "configured=true" >> $GITHUB_OUTPUT
          else
            echo "method=none" >> $GITHUB_OUTPUT
            echo "configured=false" >> $GITHUB_OUTPUT
          fi

      - name: Decrypt config file
        if: steps.check-config.outputs.method == 'encrypted'
        run: |
          CONFIG_PASS="${{ secrets.CONFIG_PASS }}" node scripts/decrypt-config.js

      - name: Configure rclone for WebDAV (Secrets)
        if: steps.check-config.outputs.method == 'secrets'
        run: |
          mkdir -p ~/.config/rclone
          cat > ~/.config/rclone/rclone.conf << EOF
          [webdav]
          type = webdav
          url = ${{ secrets.WEBDAV_URL }}
          vendor = other
          user = ${{ secrets.WEBDAV_USER }}
          pass = $(rclone obscure "${{ secrets.WEBDAV_PASS }}")
          EOF

      - name: Configure rclone for WebDAV (Encrypted config)
        if: steps.check-config.outputs.method == 'encrypted'
        run: |
          URL=$(node -e "console.log(require('./webdav-config.json').url)")
          USER=$(node -e "console.log(require('./webdav-config.json').user)")
          PASS=$(node -e "console.log(require('./webdav-config.json').pass)")
          mkdir -p ~/.config/rclone
          cat > ~/.config/rclone/rclone.conf << EOF
          [webdav]
          type = webdav
          url = ${URL}
          vendor = other
          user = ${USER}
          pass = $(rclone obscure "${PASS}")
          EOF

      - name: Sync music from WebDAV
        if: steps.check-config.outputs.configured == 'true'
        run: |
          rclone sync webdav:/ music/ \
            --progress \
            --verbose \
            --delete-excluded \
            --exclude="*.{md,txt,gitkeep}" \
            --ignore-existing \
            --size-only

      - name: Generate music.json
        if: steps.check-config.outputs.configured == 'true'
        run: node scripts/generate-music-json.js
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}

      - name: Check for changes
        id: git-check
        run: |
          git diff --quiet && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push changes
        if: steps.git-check.outputs.changed == 'true'
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: sync music from WebDAV [skip ci]"
          git pull --rebase
          git push

      - name: Skip message
        if: steps.check-config.outputs.configured == 'false'
        run: |
          echo "::warning::未配置 WebDAV。请设置 Secrets (WEBDAV_URL/USER/PASS) 或提交 webdav-config.enc + 设置 CONFIG_PASS secret"
          echo "跳过同步，等待配置完成后重新运行。"
