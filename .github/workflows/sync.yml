name: Sync Music from WebDAV

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    paths:
      - '.github/workflows/sync.yml'
      - 'webdav-config.json'

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install rclone
        run: |
          sudo apt-get update
          sudo apt-get install -y rclone

      - name: Configure rclone for WebDAV
        run: |
          mkdir -p ~/.config/rclone
          if [ -f webdav-config.json ]; then
            echo "Using webdav-config.json"
            URL=$(jq -r '.url' webdav-config.json)
            USER=$(jq -r '.user' webdav-config.json)
            PASS=$(jq -r '.pass' webdav-config.json)
          else
            echo "Using GitHub Secrets"
            URL="${{ secrets.WEBDAV_URL }}"
            USER="${{ secrets.WEBDAV_USER }}"
            PASS="${{ secrets.WEBDAV_PASS }}"
          fi
          cat > ~/.config/rclone/rclone.conf << EOF
          [webdav]
          type = webdav
          url = ${URL}
          vendor = other
          user = ${USER}
          pass = $(rclone obscure "${PASS}")
          EOF

      - name: Sync music from WebDAV
        run: |
          rclone sync webdav:/ music/ \
            --progress \
            --verbose \
            --delete-excluded \
            --exclude="*.{md,txt,gitkeep}" \
            --ignore-existing \
            --size-only

      - name: Generate music.json
        run: node scripts/generate-music-json.js
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}

      - name: Check for changes
        id: git-check
        run: |
          git diff --quiet && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push changes
        if: steps.git-check.outputs.changed == 'true'
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: sync music from WebDAV [skip ci]"
          git push
